<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Bendicion de Dios</title>
    <link rel="stylesheet" href="sesion2.css">
    <link rel="icon" href="logo.png" type="image/png">
</head>

<body>

    <div class="contenedor">

        <div class="login">

            <h1>Iniciar Sesión</h1>

            <form id="formLogin">

                <label>Usuario</label>
                <input
                    type="text"
                    id="usuario"
                    placeholder="Ingrese su usuario"
                    minlength="4"
                    maxlength="20"
                    required>

                <label>Contraseña</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Ingrese su contraseña"
                    minlength="8"
                    required>

                <div class="opciones">
                    <a href="Recuperar/Recuperar.html">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit">
                    Iniciar Sesión
                </button>

            </form>

            <div class="registro">
                <p>¿No tienes una cuenta?</p>
                <a href="Registrarse/Registro.html">Registrarse</a>
            </div>
            <div class="volver">

                <a href="../Inicio.html">
                    ← Volver
                </a>

            </div>

        </div>

    </div>

    <script src="sesion1.js"></script>

</body>

</html>
</body>
