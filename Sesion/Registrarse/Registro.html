<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Bendicion de Dios</title>
    <link rel="stylesheet" href="registro2.css">
    <link rel="icon" href="logo.png" type="image/png">
</head>

<body>

    <div class="contenedor">

        <div class="registro">

            <h1>Crear Cuenta</h1>

            <form id="formRegistro">

                <label for="usuario">Usuario</label>

                <input
                    type="text"
                    id="usuario"
                    placeholder="Ingrese un usuario"
                    minlength="4"
                    maxlength="20"
                    required>

                <label for="password">Contraseña</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Ingrese una contraseña"
                    minlength="8"
                    required>

                <label for="confirmar">Confirmar Contraseña</label>

                <input
                    type="password"
                    id="confirmar"
                    placeholder="Confirme la contraseña"
                    minlength="8"
                    required>

                <button type="submit">

                    Registrarse

                </button>

            </form>

            <div class="login">

                <a href="../Sesion.html">

                    ← Volver

                </a>

            </div>

        </div>

    </div>

    <script src="registro1.js"></script>

</body>
</html>
</body>
